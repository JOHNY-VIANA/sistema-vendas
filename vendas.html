<!DOCTYPE html>
<html lang="pt-br">
<head>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#22c55e">
  <meta charset="UTF-8">
  <title>Controle de Vendas</title>

  <link rel="stylesheet" href="style.css">

  <!-- Chart -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Plugin de rótulos -->
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

  <!-- PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<h1>📊 Controle de Vendas</h1>

<div class="container">

  <div class="box">
    <input type="number" step="0.01" id="caixa" placeholder="Caixa inicial">
    <input type="number" step="0.01" id="valor" placeholder="Valor vendido">
    <input type="number" step="0.01" id="custo" placeholder="Valor investido">
    <input type="date" id="data">
    <input type="text" id="vendedor" placeholder="Vendedor">

    <button onclick="definirCaixa()">Definir Caixa</button>
    <button onclick="adicionarVenda()">Adicionar Venda</button>
    <button onclick="exportarPDF()">Exportar PDF</button>
    <button onclick="resetar()">Resetar</button>
  </div>

  <div id="relatorio">

    <div class="box">
      <h3>💰 Caixa Atual</h3>
      <p id="caixaAtual">R$ 0</p>
    </div>

    <div class="box">
      <h3>🏆 Ranking</h3>
      <ul id="ranking"></ul>
    </div>

    <div class="box">
      <h3>📈 Evolução do Caixa</h3>
      <canvas id="graficoCaixa"></canvas>
    </div>

    <div class="box">
      <h3>📊 Vendas por Célula</h3>
      <canvas id="graficoVendedores"></canvas>
    </div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
